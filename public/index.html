<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TMS Price Monitor & Order Bot</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>TMS Monitor</h1>
      <div class="header-right">
        <div class="controls-inline">
          <button onclick="app.openTMS()" id="openTmsBtn" class="btn btn-primary">1. Open TMS</button>
          <button onclick="app.startMonitoring()" id="startBtn" class="btn btn-success" disabled>2. Start</button>
          <button onclick="app.stopMonitoring()" id="stopBtn" class="btn btn-danger" disabled>Stop</button>
          <button onclick="app.closeBrowser()" id="closeBtn" class="btn btn-secondary" disabled>Close TMS</button>
        </div>
        <div class="status-indicator" id="statusIndicator">
          <span class="status-dot"></span>
          <span id="statusText">Idle</span>
        </div>
      </div>
    </header>

    <!-- Top Bar: Companies + Stats -->
    <div class="top-bar">
      <div class="companies-bar" id="companiesConfig">
        <!-- Companies loaded dynamically -->
      </div>
      <div class="stats-bar">
        <span id="priceCheckCount" class="stat-badge price">P: 0</span>
        <span id="orderPlaceCount" class="stat-badge order">O: 0</span>
        <span id="cycleTime" class="stat-badge cycle">Cycle: -</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-grid">
      <!-- Accounts Table -->
      <section class="panel accounts-panel">
        <div class="panel-header">
          <h2>Accounts</h2>
          <div class="panel-actions">
            <button onclick="app.checkAll('price', true)" class="btn btn-xs" title="Enable price check on all">All P</button>
            <button onclick="app.checkAll('price', false)" class="btn btn-xs" title="Disable price check on all">No P</button>
            <button onclick="app.checkAll('order', true)" class="btn btn-xs" title="Enable order on all">All O</button>
            <button onclick="app.checkAll('order', false)" class="btn btn-xs" title="Disable order on all">No O</button>
            <button onclick="app.toggleAddForm()" class="btn btn-xs btn-primary" id="toggleAddBtn">+ Add</button>
          </div>
        </div>

        <!-- Collapsible Add Form -->
        <div id="addAccountForm" class="add-form" style="display:none;">
          <div class="add-form-grid">
            <input type="text" id="subdomainTms" placeholder="TMS (e.g., tms13)">
            <select id="subdomainDomain">
              <option value="nepsetms.com.np">nepsetms.com.np</option>
              <option value="__custom__">Custom...</option>
            </select>
            <input type="text" id="subdomainDomainCustom" placeholder="Custom domain" style="display:none;">
            <input type="text" id="subdomainName" placeholder="Name">
            <select id="subdomainRole">
              <option value="both">Both</option>
              <option value="price">Price</option>
              <option value="order">Order</option>
            </select>
            <select id="subdomainType" onchange="app.toggleAtsFields()">
              <option value="nepse">NEPSE</option>
              <option value="ats">ATS</option>
            </select>
            <button onclick="app.addSubdomain()" class="btn btn-primary">Add</button>
          </div>
          <div id="atsInlineFields" style="display:none;">
            <input type="text" id="subdomainBroker" placeholder="Broker">
            <input type="text" id="subdomainAcntid" placeholder="Account ID">
            <input type="text" id="subdomainClientAcc" placeholder="Client Account">
          </div>
        </div>

        <div id="subdomainsList" class="accounts-table">
          <!-- Accounts rendered here -->
        </div>
      </section>

      <!-- Logs -->
      <section class="panel logs-panel">
        <div class="panel-header">
          <h2>Logs</h2>
          <button onclick="app.clearLogs()" class="btn btn-xs">Clear</button>
        </div>
        <div id="logsList" class="logs-list"></div>
      </section>
    </div>

    <!-- Scripts (hidden by default) -->
    <details class="scripts-section">
      <summary>Advanced: Scripts</summary>
      <div class="scripts-grid">
        <div>
          <button onclick="app.loadDefaultPriceScript()" class="btn btn-secondary btn-small">Load Price Script</button>
          <textarea id="priceScript" rows="4"></textarea>
          <button onclick="app.setPriceScript()" class="btn btn-primary btn-small">Save</button>
        </div>
        <div>
          <button onclick="app.loadDefaultOrderScript()" class="btn btn-secondary btn-small">Load Order Script</button>
          <textarea id="orderScript" rows="4"></textarea>
          <button onclick="app.setOrderScript()" class="btn btn-primary btn-small">Save</button>
        </div>
      </div>
    </details>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
